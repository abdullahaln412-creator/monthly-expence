<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>মাসিক আয়-ব্যয় হিসাব</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css" />
<style>
  :root {
    --surface-2: #ffffff;
    --surface-1: #f7f6f2;
    --surface-0: #f1efe8;
    --text-primary: #1a1a1a;
    --text-secondary: #5f5e5a;
    --text-muted: #8a8880;
    --border: #e3e1d9;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans Bengali", sans-serif;
    background: var(--surface-0);
    color: var(--text-primary);
    margin: 0;
    padding: 1.5rem;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 1rem; }
  select, input, button {
    height: 38px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0 10px;
    font-size: 14px;
    background: var(--surface-2);
    color: var(--text-primary);
    font-family: inherit;
  }
  button { cursor: pointer; }
  button:hover { background: var(--surface-1); }
  .topbar { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 0.75rem; }
  .langBtn { padding: 4px 12px; font-size: 12px; height: auto; transition: all 0.15s ease; }
  .langBtn.active { background: #D85A30 !important; color: #fff !important; border-color: #D85A30 !important; }
  .selRow { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .selRow select { flex: 1; min-width: 160px; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metricCard { border-radius: var(--radius); padding: 1rem; animation: popIn 0.4s ease; transition: transform 0.2s ease; }
  .metricCard:hover { transform: translateY(-2px); }
  .metricCard p:first-child { font-size: 13px; margin: 0 0 4px; }
  .metricCard p:last-child { font-size: 24px; font-weight: 500; margin: 0; }
  .card { background: var(--surface-2); border-radius: 12px; border: 0.5px solid var(--border); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .card p.title { font-size: 14px; font-weight: 500; margin: 0 0 12px; }
  .typeToggle { display: flex; gap: 8px; margin-bottom: 12px; }
  .typeBtn { flex: 1; height: 40px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface-1); font-size: 14px; font-weight: 500; transition: all 0.15s ease; }
  .typeBtn.active-expense { background: #E24B4A; color: #fff; border-color: #E24B4A; }
  .typeBtn.active-income { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .formGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 8px; margin-bottom: 8px; }
  .formGrid select, .formGrid input { width: 100%; }
  .amountWrap { position: relative; display: flex; align-items: center; }
  .amountWrap i { position: absolute; left: 10px; font-size: 15px; color: var(--text-muted); pointer-events: none; }
  .amountWrap input { padding-left: 30px; }
  #noteIn { width: 100%; margin-bottom: 8px; }
  #addBtn { width: 100%; color: #fff; border: none; transition: transform 0.15s ease, background 0.2s ease; }
  #addBtn:active { transform: scale(0.96); }
  .barRow { margin-bottom: 10px; }
  .barLabel { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .barTrack { border-radius: 6px; height: 8px; overflow: hidden; }
  .barFill { height: 100%; border-radius: 6px; width: 0%; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); }
  #listWrap p.title { font-size: 14px; font-weight: 500; margin: 0 0 8px; }
  .entryRow { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); gap: 8px; animation: slideIn 0.35s ease; }
  .pill { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; transition: transform 0.15s ease; }
  .pill:hover { transform: scale(1.05); }
  .entryNote { font-size: 13px; margin: 0; color: var(--text-secondary); }
  .entryDate { font-size: 12px; color: var(--text-muted); margin: 0; }
  .entryAmount { font-size: 14px; font-weight: 500; }
  .delBtn { width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; }
  .emptyMsg { font-size: 13px; color: var(--text-muted); padding: 1rem 0; }
  .syncStatus { font-size: 12px; color: var(--text-muted); margin: 0 0 1rem; display: flex; align-items: center; gap: 6px; }
  .syncDot { width: 7px; height: 7px; border-radius: 50%; background: #639922; }
  .syncDot.offline { background: #E24B4A; }
  .filterRow { display: flex; gap: 6px; margin-bottom: 10px; }
  .filterBtn { padding: 4px 12px; font-size: 12px; height: auto; border-radius: 20px; }
  .filterBtn.active { background: #D85A30; color: #fff; border-color: #D85A30; }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px);} to { opacity:1; transform:translateY(0);} }
  @keyframes popIn { from { opacity:0; transform:scale(0.85);} to { opacity:1; transform:scale(1);} }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="mainTitle">💰 মাসিক আয়-ব্যয় হিসাব</h1>
  <p class="syncStatus"><span class="syncDot" id="syncDot"></span><span id="syncText">সিঙ্ক হচ্ছে...</span></p>

  <div class="topbar">
    <button id="langBn" class="langBtn active">বাংলা</button>
    <button id="langEn" class="langBtn">English</button>
  </div>

  <div class="selRow">
    <select id="cycleType"></select>
    <select id="cyclePicker"></select>
  </div>

  <div class="metrics">
    <div class="metricCard" style="background:#E1F5EE;">
      <p style="color:#085041;"><i class="ti ti-arrow-up-circle"></i> <span id="lblIncome"></span></p>
      <p style="color:#04342C;" id="incomeOut">¥0</p>
    </div>
    <div class="metricCard" style="background:#FAECE7; animation-delay:0.05s;">
      <p style="color:#993C1D;"><i class="ti ti-arrow-down-circle"></i> <span id="lblExpense"></span></p>
      <p style="color:#4A1B0C;" id="expenseOut">¥0</p>
    </div>
    <div class="metricCard" id="balanceCard" style="background:#EEEDFE; animation-delay:0.1s;">
      <p style="color:#3C3489;"><i class="ti ti-scale"></i> <span id="lblBalance"></span></p>
      <p style="color:#26215C;" id="balanceOut">¥0</p>
    </div>
  </div>

  <div id="breakdownWrap"></div>

  <div class="card">
    <p class="title"><i class="ti ti-plus" style="color:#D85A30;"></i> <span id="lblAddExpense"></span></p>
    <div class="typeToggle">
      <button type="button" id="typeExpenseBtn" class="typeBtn active-expense"></button>
      <button type="button" id="typeIncomeBtn" class="typeBtn"></button>
    </div>
    <div class="formGrid">
      <input type="date" id="dateIn" />
      <div class="amountWrap">
        <i class="ti ti-currency-yen"></i>
        <input type="number" id="amountIn" placeholder="" min="0" step="1" />
      </div>
      <select id="catIn"></select>
    </div>
    <input type="text" id="noteIn" placeholder="" />
    <button id="addBtn"><i class="ti ti-plus"></i> <span id="lblAddBtn"></span></button>
  </div>

  <div id="listWrap">
    <p class="title" id="lblListTitle"></p>
    <div class="filterRow" id="filterRow"></div>
    <div id="entryList"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc,
  onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA7V4p4qtjKYuN6tQyXIb877fPQwlzcQOo",
  authDomain: "monthly-expense-7792c.firebaseapp.com",
  projectId: "monthly-expense-7792c",
  storageBucket: "monthly-expense-7792c.firebasestorage.app",
  messagingSenderId: "544431335955",
  appId: "1:544431335955:web:bad767c9e6688dccd86de6",
  measurementId: "G-0F1D1Z5GSX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const expensesRef = collection(db, "expenses");

let all = [];
let lang = localStorage.getItem('lang_pref_v1') || 'bn';
let currentType = 'expense'; // form toggle state: 'expense' | 'income'
let listFilter = 'all'; // 'all' | 'expense' | 'income'

const EXPENSE_CATS = [
  { key:'food', bn:'খাবার', en:'Food', emoji:'🍚', bg:'#EAF3DE', text800:'#27500A', bar:'#639922' },
  { key:'rent', bn:'বাসা ভাড়া', en:'Rent', emoji:'🏠', bg:'#E6F1FB', text800:'#0C447C', bar:'#378ADD' },
  { key:'transport', bn:'যাতায়াত', en:'Transport', emoji:'🚌', bg:'#FAEEDA', text800:'#633806', bar:'#BA7517' },
  { key:'study', bn:'পড়াশোনা', en:'Study', emoji:'📚', bg:'#EEEDFE', text800:'#3C3489', bar:'#7F77DD' },
  { key:'clothing', bn:'পোশাক কেনাকাটা', en:'Clothing', emoji:'👕', bg:'#E1F5EE', text800:'#085041', bar:'#1D9E75' },
  { key:'entertainment', bn:'বিনোদন', en:'Entertainment', emoji:'🎬', bg:'#FBEAF0', text800:'#72243E', bar:'#D4537E' },
  { key:'health', bn:'স্বাস্থ্য', en:'Health', emoji:'🩺', bg:'#FCEBEB', text800:'#791F1F', bar:'#E24B4A' },
  { key:'other_exp', bn:'অন্যান্য', en:'Other', emoji:'📦', bg:'#F1EFE8', text800:'#444441', bar:'#888780' }
];
const INCOME_CATS = [
  { key:'family', bn:'পারিবারিক সহায়তা', en:'Family support', emoji:'👨‍👩‍👧', bg:'#E1F5EE', text800:'#085041', bar:'#1D9E75' },
  { key:'scholarship', bn:'বৃত্তি', en:'Scholarship', emoji:'🎓', bg:'#EEEDFE', text800:'#3C3489', bar:'#7F77DD' },
  { key:'salary', bn:'বেতন/পার্ট-টাইম', en:'Salary/Part-time', emoji:'💼', bg:'#E6F1FB', text800:'#0C447C', bar:'#378ADD' },
  { key:'freelance', bn:'ফ্রিল্যান্স', en:'Freelance', emoji:'💻', bg:'#FAEEDA', text800:'#633806', bar:'#BA7517' },
  { key:'other_inc', bn:'অন্যান্য', en:'Other', emoji:'📦', bg:'#F1EFE8', text800:'#444441', bar:'#888780' }
];
function catsForType(type){ return type === 'income' ? INCOME_CATS : EXPENSE_CATS; }
function catByKey(k, type){
  const list = catsForType(type);
  return list.find(c => c.key === k) || list[list.length-1];
}
function catLabel(c){ return lang==='bn' ? c.bn : c.en; }

const T = {
  bn: {
    calendar:'১ তারিখ থেকে ৩০/৩১ তারিখ', mid:'১৫ তারিখ থেকে ১৫ তারিখ',
    income:'মোট আয়', expense:'মোট খরচ', balance:'উদ্বৃত্ত',
    addExpense:'নতুন এন্ট্রি যোগ করুন', amountPh:'টাকার পরিমাণ', notePh:'নোট (ঐচ্ছিক)',
    addBtn:'যোগ করুন', listTitle:'হিসাবের তালিকা', empty:'এই সাইকেলে কোনো হিসাব যোগ করা হয়নি।',
    breakdown:'খাত অনুযায়ী খরচ', del:'মুছুন', title:'💰 মাসিক আয়-ব্যয় হিসাব',
    syncing:'সিঙ্ক হচ্ছে...', online:'সব ডিভাইসে সিঙ্ক আছে', offline:'সংযোগ বিচ্ছিন্ন',
    typeExpense:'💸 খরচ', typeIncome:'💰 আয়',
    filterAll:'সব', filterExpense:'খরচ', filterIncome:'আয়'
  },
  en: {
    calendar:'1st to 30th/31st', mid:'15th to 15th',
    income:'Total income', expense:'Total expense', balance:'Balance',
    addExpense:'Add new entry', amountPh:'Amount', notePh:'Note (optional)',
    addBtn:'Add', listTitle:'Entry list', empty:'No entries added in this cycle.',
    breakdown:'Spending by category', del:'Delete', title:'💰 Monthly income & expense',
    syncing:'Syncing...', online:'Synced across devices', offline:'Offline',
    typeExpense:'💸 Expense', typeIncome:'💰 Income',
    filterAll:'All', filterExpense:'Expense', filterIncome:'Income'
  }
};

function fmt(n){ return '¥' + Math.round(n).toLocaleString('en-US'); }

function parseLocalDate(str){
  const parts = String(str).split('-').map(Number);
  return new Date(parts[0], parts[1]-1, parts[2]);
}

function setFormType(type){
  currentType = type;
  const t = T[lang];
  const expBtn = document.getElementById('typeExpenseBtn');
  const incBtn = document.getElementById('typeIncomeBtn');
  expBtn.classList.toggle('active-expense', type === 'expense');
  incBtn.classList.toggle('active-income', type === 'income');
  const addBtn = document.getElementById('addBtn');
  addBtn.style.background = type === 'income' ? '#1D9E75' : '#D85A30';
  const catIn = document.getElementById('catIn');
  catIn.innerHTML = catsForType(type).map(c => `<option value="${c.key}">${c.emoji} ${catLabel(c)}</option>`).join('');
}
document.getElementById('typeExpenseBtn').addEventListener('click', () => setFormType('expense'));
document.getElementById('typeIncomeBtn').addEventListener('click', () => setFormType('income'));

function applyStaticLabels(){
  const t = T[lang];
  document.getElementById('mainTitle').textContent = t.title;
  document.getElementById('lblIncome').textContent = t.income;
  document.getElementById('lblExpense').textContent = t.expense;
  document.getElementById('lblBalance').textContent = t.balance;
  document.getElementById('lblAddExpense').textContent = t.addExpense;
  document.getElementById('lblAddBtn').textContent = t.addBtn;
  document.getElementById('lblListTitle').textContent = t.listTitle;
  document.getElementById('amountIn').placeholder = t.amountPh;
  document.getElementById('noteIn').placeholder = t.notePh;
  document.getElementById('typeExpenseBtn').textContent = t.typeExpense;
  document.getElementById('typeIncomeBtn').textContent = t.typeIncome;

  const cycleTypeSel = document.getElementById('cycleType');
  const prevVal = cycleTypeSel.value || 'calendar';
  cycleTypeSel.innerHTML = `<option value="calendar">${t.calendar}</option><option value="mid">${t.mid}</option>`;
  cycleTypeSel.value = prevVal;

  setFormType(currentType);

  const filterRow = document.getElementById('filterRow');
  filterRow.innerHTML = `
    <button type="button" class="filterBtn" data-f="all">${t.filterAll}</button>
    <button type="button" class="filterBtn" data-f="expense">${t.filterExpense}</button>
    <button type="button" class="filterBtn" data-f="income">${t.filterIncome}</button>`;
  filterRow.querySelectorAll('.filterBtn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-f') === listFilter);
    b.addEventListener('click', () => { listFilter = b.getAttribute('data-f'); render(); });
  });

  document.getElementById('langBn').classList.toggle('active', lang==='bn');
  document.getElementById('langEn').classList.toggle('active', lang==='en');
}

function getCycleOptions(type){
  const opts = [];
  const now = new Date();
  const locale = lang==='bn' ? 'bn-BD' : 'en-US';
  if(type === 'calendar'){
    for(let i=0;i<6;i++){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const y = d.getFullYear(), m = d.getMonth();
      const lastDay = new Date(y, m+1, 0).getDate();
      const start = new Date(y,m,1);
      const end = new Date(y,m,lastDay);
      const monthLabel = start.toLocaleDateString(locale,{month:'long',year:'numeric'});
      opts.push({ label: lang==='bn' ? `${monthLabel} (১ - ${lastDay})` : `${monthLabel} (1 - ${lastDay})`, start, end });
    }
  } else {
    for(let i=0;i<6;i++){
      const base = new Date(now.getFullYear(), now.getMonth()-i, 15);
      const start = new Date(base.getFullYear(), base.getMonth(), 15);
      const end = new Date(base.getFullYear(), base.getMonth()+1, 14);
      const lbl = lang==='bn'
        ? `${start.getMonth()+1}/${start.getFullYear()} এর ১৫ - ${end.getMonth()+1}/${end.getFullYear()} এর ১৫`
        : `${start.getMonth()+1}/${start.getFullYear()} 15th - ${end.getMonth()+1}/${end.getFullYear()} 15th`;
      opts.push({ label: lbl, start, end });
    }
  }
  return opts;
}

const cycleTypeSel = document.getElementById('cycleType');
const cyclePickerSel = document.getElementById('cyclePicker');
let currentOpts = [];

function refreshCyclePicker(){
  currentOpts = getCycleOptions(cycleTypeSel.value);
  cyclePickerSel.innerHTML = '';
  currentOpts.forEach((o, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = o.label;
    cyclePickerSel.appendChild(opt);
  });
  render();
}

cycleTypeSel.addEventListener('change', refreshCyclePicker);
cyclePickerSel.addEventListener('change', render);

function setLang(newLang){
  lang = newLang;
  localStorage.setItem('lang_pref_v1', lang);
  applyStaticLabels();
  refreshCyclePicker();
}
document.getElementById('langBn').addEventListener('click', () => setLang('bn'));
document.getElementById('langEn').addEventListener('click', () => setLang('en'));

function animateNumber(el, to){
  let start = null;
  const dur = 500;
  function step(ts){
    if(!start) start = ts;
    const p = Math.min((ts - start) / dur, 1);
    const eased = 1 - Math.pow(1-p, 3);
    el.textContent = fmt(to * eased);
    if(p < 1) requestAnimationFrame(step);
    else el.textContent = fmt(to);
  }
  requestAnimationFrame(step);
}

function render(){
  const t = T[lang];
  const idx = parseInt(cyclePickerSel.value || 0);
  const range = currentOpts[idx];
  const listEl = document.getElementById('entryList');
  const breakdownEl = document.getElementById('breakdownWrap');
  listEl.innerHTML = '';
  breakdownEl.innerHTML = '';
  if(!range) return;

  const inCycle = all.filter(e => {
    const d = parseLocalDate(e.date);
    return d >= range.start && d <= new Date(range.end.getFullYear(), range.end.getMonth(), range.end.getDate(), 23,59,59);
  });

  let totalIncome = 0, totalExpense = 0;
  const catTotals = {}; // expense-only breakdown
  inCycle.forEach(e => {
    const type = e.type || 'expense';
    if(type === 'income') totalIncome += Number(e.amount);
    else {
      totalExpense += Number(e.amount);
      catTotals[e.category] = (catTotals[e.category]||0) + Number(e.amount);
    }
  });
  const balance = totalIncome - totalExpense;

  animateNumber(document.getElementById('incomeOut'), totalIncome);
  animateNumber(document.getElementById('expenseOut'), totalExpense);
  const balEl = document.getElementById('balanceOut');
  balEl.textContent = (balance < 0 ? '-' : '') + fmt(Math.abs(balance));
  const balCard = document.getElementById('balanceCard');
  if(balance < 0){
    balCard.style.background = '#FAECE7';
    balEl.style.color = '#4A1B0C';
  } else {
    balCard.style.background = '#EEEDFE';
    balEl.style.color = '#26215C';
  }

  const catKeys = Object.keys(catTotals).sort((a,b) => catTotals[b]-catTotals[a]);
  if(catKeys.length){
    const bd = document.createElement('div');
    bd.className = 'card';
    bd.innerHTML = `<p class="title"><i class="ti ti-chart-bar" style="color:#7F77DD;"></i> ${t.breakdown}</p>`;
    catKeys.forEach(ck => {
      const col = catByKey(ck, 'expense');
      const pct = totalExpense > 0 ? (catTotals[ck]/totalExpense*100) : 0;
      const row = document.createElement('div');
      row.className = 'barRow';
      row.innerHTML = `
        <div class="barLabel"><span>${col.emoji} ${catLabel(col)}</span><span style="font-weight:500;">${fmt(catTotals[ck])}</span></div>
        <div class="barTrack" style="background:${col.bg};"><div class="barFill" style="background:${col.bar};" data-pct="${pct}"></div></div>`;
      bd.appendChild(row);
    });
    breakdownEl.appendChild(bd);
    setTimeout(() => {
      bd.querySelectorAll('.barFill').forEach(b => { b.style.width = b.getAttribute('data-pct') + '%'; });
    }, 30);
  }

  const filtered = inCycle
    .filter(e => listFilter === 'all' ? true : (e.type || 'expense') === listFilter)
    .sort((a,b) => parseLocalDate(b.date) - parseLocalDate(a.date));

  if(filtered.length === 0){
    const empty = document.createElement('p');
    empty.className = 'emptyMsg';
    empty.textContent = t.empty;
    listEl.appendChild(empty);
    return;
  }

  const dateLocale = lang==='bn' ? 'bn-BD' : 'en-US';
  filtered.forEach((e, i) => {
    const type = e.type || 'expense';
    const col = catByKey(e.category, type);
    const row = document.createElement('div');
    row.className = 'entryRow';
    row.style.animationDelay = (i*0.03) + 's';
    const d = parseLocalDate(e.date);
    const dateStr = d.toLocaleDateString(dateLocale, {day:'numeric', month:'short'});
    const sign = type === 'income' ? '+' : '−';
    const amountColor = type === 'income' ? '#085041' : '#993C1D';
    row.innerHTML = `
      <div style="display:flex; align-items:center; gap:10px; min-width:0;">
        <span class="pill" style="background:${col.bg}; color:${col.text800};">${col.emoji} ${catLabel(col)}</span>
        <div style="min-width:0;">
          ${e.note ? `<p class="entryNote">${e.note}</p>` : ''}
          <p class="entryDate">${dateStr}</p>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:10px; flex-shrink:0;">
        <span class="entryAmount" style="color:${amountColor};">${sign} ${fmt(e.amount)}</span>
        <button data-id="${e.id}" class="delBtn" aria-label="${t.del}"><i class="ti ti-trash"></i></button>
      </div>`;
    listEl.appendChild(row);
  });

  document.querySelectorAll('.delBtn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.getAttribute('data-id');
      try {
        await deleteDoc(doc(db, "expenses", id));
      } catch(err){ console.error('delete failed', err); alert(lang==='bn' ? 'মুছতে সমস্যা হয়েছে, আবার চেষ্টা করুন' : 'Delete failed, try again'); }
    });
  });
}

document.getElementById('dateIn').value = new Date().toISOString().slice(0,10);

document.getElementById('addBtn').addEventListener('click', async () => {
  const date = document.getElementById('dateIn').value;
  const amount = parseFloat(document.getElementById('amountIn').value);
  const category = document.getElementById('catIn').value;
  const note = document.getElementById('noteIn').value.trim();
  if(!date || !amount || amount <= 0) return;
  try {
    await addDoc(expensesRef, { date, amount, category, note, type: currentType, createdAt: serverTimestamp() });
    document.getElementById('amountIn').value = '';
    document.getElementById('noteIn').value = '';
  } catch(err){
    console.error('add failed', err);
    alert(lang==='bn' ? 'যোগ করতে সমস্যা হয়েছে' : 'Failed to add entry');
  }
});

const q = query(expensesRef, orderBy("date", "desc"));
onSnapshot(q, (snapshot) => {
  all = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  document.getElementById('syncDot').classList.remove('offline');
  document.getElementById('syncText').textContent = T[lang].online;
  render();
}, (error) => {
  console.error('sync error', error);
  document.getElementById('syncDot').classList.add('offline');
  document.getElementById('syncText').textContent = T[lang].offline;
});

applyStaticLabels();
refreshCyclePicker();
</script>
</body>
</html>
